<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#C4623A"/>

  <!-- Dotted arc -->
  <path d="M 10 46 A 22 22 0 0 1 54 46"
        stroke="#F5EFE4" stroke-width="2" stroke-dasharray="2 5"
        stroke-linecap="round"/>

  <!-- Arc endpoints — filled dots -->
  <circle cx="10" cy="46" r="2.5" fill="#F5EFE4"/>
  <circle cx="54" cy="46" r="2.5" fill="#F5EFE4"/>

  <!-- Arc apex — hollow circle -->
  <circle cx="32" cy="24" r="2.5" stroke="#F5EFE4" stroke-width="2"/>

  <!-- DUOMO — left -->
  <rect x="16" y="38" width="13" height="8" fill="#F5EFE4"/>
  <path d="M 16 38 A 6.5 6.5 0 0 1 29 38" fill="#F5EFE4"/>
  <rect x="21" y="30" width="2.5" height="5" rx="0.5" fill="#F5EFE4"/>
  <circle cx="22.25" cy="29.5" r="1.5" fill="#F5EFE4"/>

  <!-- TORRE — right -->
  <rect x="33" y="32" width="9" height="14" fill="#F5EFE4"/>
  <rect x="33" y="29" width="2.5" height="4" rx="0.3" fill="#F5EFE4"/>
  <rect x="36.5" y="29" width="2.5" height="4" rx="0.3" fill="#F5EFE4"/>
  <rect x="40" y="29" width="2.5" height="4" rx="0.3" fill="#F5EFE4"/>
</svg>
